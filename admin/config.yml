backend:
  name: github
  repo: wang99404008-proce/Personal_Resume
  branch: main  # 如果你的 GitHub 預設分支是 master 請改成 master
  base_url: https://decap-cms-oauth.vercel.app

media_folder: "data"
public_folder: "/data"

collections:
  - name: "resume"
    label: "履歷資料"
    folder: "data"
    format: "frontmatter"     # 修正：把 yml- 拿掉，正確名稱是 frontmatter
    extension: "md"           # 維持副檔名為 .md
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "姓名", name: "name", widget: "string" }
      - { label: "現任職稱", name: "title", widget: "string" }
      - { label: "個人簡介", name: "bio", widget: "text" }
      - { label: "詳細內文", name: "body", widget: "markdown" }
